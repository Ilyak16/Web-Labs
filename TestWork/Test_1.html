<html lang="ru">
<head>
  <title>
    Ландшафтный дизайн
  </title>
  <meta charset="UTF-8">
  
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.6;
        color: grey;
    }
    header {
        background: green;
        color: white;
        padding: 20px;
        text-align: center;
    }
    .hero {
        background: white;
        padding: 60px 20px;
        text-align: center;
        
    }
    .hero h2{
        background: white;
        padding: 60px 20px;
        text-align: center;
    }
    .hero p {
        font-size: 16px;
        color: black;
        margin-bottom: 20px;
    }
    p.down{
        color: green;
        position: relative;
        top: 130px;
        font-size: 64px;
    }
    .btn {
        background: #2d5a3d;
        color: white;
        padding: 15px 30px;
        display: inline-block;
        border-radius: 5px;
    }
    .content-wrapper{
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        padding: 20px;
    } 
    .image-block{
        flex: 0 0 50%;
        max-width: 600px;
    }
    .text-block{
        flex: 0 0 40;
        text-align: left;
    }

  </style>
</head>
<body>
    <header>
        Ландшафтный дизайн
    </header>
    <div class="hero">
        <h2>Создаём красивые сады</h2>
        <p class="down">Ландшафтный дизайн </p>
        <div class="content-wrapper">
            <div class="image-block">
                <img src="https://img.7dach.ru/image/600/00/00/48/2016/11/15/fa21c9.jpg"/>
            </div> 
            <div class="text-block">
                <p>
                    Ландшафтный дизайн <br> 
                    Благоустройство и озеленение участка
                </p>
                <span class="btn">Получить консультацию</span>
            </div>
        </div>
    </div>
    
</body>
